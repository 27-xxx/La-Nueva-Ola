<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexander Sex Shop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f2027;
color:white;
overflow-x:hidden;
}

/* Fondo animado */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#00ffff,#ff00ff,#00ffff);
animation:fondo 15s linear infinite;
opacity:0.2;
}

@keyframes fondo{
0%{transform:translate(-25%,-25%) rotate(0deg);}
100%{transform:translate(-25%,-25%) rotate(360deg);}
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
padding:20px 10%;
background:rgba(0,0,0,0.6);
position:relative;
z-index:2;
}

nav h1{
font-size:26px;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:20px;
}

nav ul li a{
color:white;
text-decoration:none;
transition:0.3s;
}

nav ul li a:hover{
color:#00ffff;
}

/* Hero */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
z-index:2;
}

.hero h2{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
margin-bottom:30px;
}

button{
padding:15px 35px;
border:none;
background:#00ffff;
color:black;
font-size:18px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* Proyectos */

.section{
padding:80px 10%;
text-align:center;
position:relative;
z-index:2;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:10px;
width:260px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
background:rgba(255,255,255,0.2);
}

/* Footer */

footer{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.7);
position:relative;
z-index:2;
}

</style>
</head>

<body>

<nav>
<h1>🌊 La Nueva Ola</h1>

<ul>
<li><a href="#">Inicio</a></li>
<li><a href="#">Proyectos</a></li>
<li><a href="#">Contacto</a></li>
</ul>

</nav>

<section class="hero">

<h2>Bienvenido</h2>
<p>Mi sitio web creado con Mi Inteligencia</p>

<button onclick="alert('Bienvenido a La Nueva Ola 🚀')">
Entrar
</button>

</section>

<section class="section">

<h2>Mis Proyectos</h2>

<div class="cards">

<div class="card">
<h3>Proyecto 1</h3>
<p>Aquí puedes mostrar tu primer proyecto.</p>
</div>

<div class="card">
<h3>Proyecto 2</h3>
<p>Aquí puedes mostrar tu segundo proyecto.</p>
</div>

<div class="card">
<h3>Proyecto 3</h3>
<p>>
</div>

</div>

</section>

<footer>
© 2026 El 27
</footer>

</body>
</html>
